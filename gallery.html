<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Best</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<a class="back" href="index.html">← Nazad na meni</a>

<div id="gallery"></div>

<script>
const params = new URLSearchParams(window.location.search);
const cat = params.get('cat');

const images = {

  summer: [
    'images/summer/SUMMER-MENU-1.jpg',
    'images/summer/SUMMER-MENU-2.jpg',
    'images/summer/SUMMER-MENU-3.jpg'
  ],

  coffee: [
    'images/coffe time/COFFE-TIME-1.jpg',
    'images/coffe time/COFFE-TIME-2.jpg'
  ],

  snack: [
    'images/snack sweet/SNACK-SWEET.jpg'
  ],

  icecream: [
    'images/icecream/ICE-CREAM.jpg'
  ],

  cocktails: [
    'images/cocktails/COCKTAILS-1 - Copy.jpg',
    'images/cocktails/COCKTAILS-2 - Copy.jpg',
    'images/cocktails/COCKTAILS-3 - Copy.jpg'
  ],

  combo: [
    'images/combo/COMBO.jpg'
  ],

  beer: [
    'images/beer/PIVO-I-VINO.jpg'
  ],

  alcohol: [
    'images/alcohol/ALKOHOLNA-PICA.jpg',
    'images/alcohol/BOCE.jpg'
  ]

};

const gallery = document.getElementById('gallery');

if (images[cat]) {
  images[cat].forEach(path => {
    const img = document.createElement('img');
    img.src = path;
    img.className = 'menuimg';
    gallery.appendChild(img);
  });
}
</script>

</body>
</html>
