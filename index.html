<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Best</title>
<link rel="stylesheet" href="style.css?v=40">
</head>

<body>

<div id="loader"></div>

<div class="container page-content">

    <div class="menu-wrapper">
        <img class="hero" src="MAIN-PAGE.jpg" alt="The Best">

        <a href="gallery.html?cat=coffee&v=30" class="hotspot coffee"></a>
        <a href="gallery.html?cat=summer" class="hotspot summer"></a>
        <a href="gallery.html?cat=snack" class="hotspot snack"></a>
        <a href="gallery.html?cat=icecream" class="hotspot icecream"></a>
        <a href="gallery.html?cat=cocktails" class="hotspot cocktails"></a>
        <a href="gallery.html?cat=combo" class="hotspot combo"></a>
        <a href="gallery.html?cat=beer" class="hotspot beer"></a>
        <a href="gallery.html?cat=alcohol" class="hotspot alcohol"></a>
    </div>

</div>

<script>
window.addEventListener('load', () => {
    const loader = document.getElementById('loader');
    const content = document.querySelector('.page-content');

    const hasVisited = sessionStorage.getItem('visitedHome');
    const loadingTime = hasVisited ? 1300 : 2000;

    sessionStorage.setItem('visitedHome', 'true');

    setTimeout(() => {
        loader.classList.add('hide');
        content.classList.add('show');
    }, loadingTime);
});
</script>
